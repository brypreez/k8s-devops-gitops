apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: longhorn
  namespace: argocd
spec:
  source:
    repoURL: 'https://charts.longhorn.io' # The official Longhorn repo
    targetRevision: 1.7.2                 # The version you want
    chart: longhorn                       # The name of the chart
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: longhorn-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - SkipHooks=true  # <--- THIS MUST BE HERE
