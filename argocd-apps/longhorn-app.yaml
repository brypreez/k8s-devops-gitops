apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: longhorn
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/your-repo/k8s-homelab-gitops.git' # your repo here
    targetRevision: HEAD
    path: charts/longhorn # or wherever your chart/manifest lives
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: longhorn-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - SkipHooks=true  # <--- THIS MUST BE HERE
